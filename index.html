<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>3D フライトシミュレーター</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #020610;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    #cesiumContainer {
      width: 100vw;
      height: 100vh;
      display: none;
    }

    /* ── Start Screen ── */
    #startScreen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 60%, #0d1b3e 0%, #020610 100%);
      z-index: 100;
    }

    .start-content {
      text-align: center;
      color: #fff;
      max-width: 440px;
      padding: 0 24px;
    }

    .plane-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-8deg); }
      50%       { transform: translateY(-14px) rotate(-3deg); }
    }

    .start-content h1 {
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .start-content .desc {
      color: rgba(255,255,255,0.55);
      font-size: 0.88rem;
      line-height: 1.65;
      margin-bottom: 8px;
    }

    .api-note {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .api-note a { color: #60a5fa; }

    #apiKeyInput {
      width: 100%;
      padding: 13px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 0.93rem;
      margin-bottom: 10px;
      outline: none;
      transition: border 0.2s;
    }

    #apiKeyInput::placeholder { color: rgba(255,255,255,0.28); }
    #apiKeyInput:focus { border-color: #60a5fa; }

    #startBtn {
      width: 100%;
      padding: 13px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      color: #fff;
      font-size: 0.97rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }

    #startBtn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    #startBtn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* Control mode selector */
    .ctrl-selector {
      display: flex; gap: 8px; margin-bottom: 10px;
    }
    .ctrl-btn {
      flex: 1; padding: 10px 8px; border-radius: 8px; font-size: 0.85rem;
      border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.65); cursor: pointer; transition: all 0.15s;
    }
    .ctrl-btn.active {
      background: rgba(59,130,246,0.3); border-color: #3b82f6; color: #fff;
    }
    #tiltStatus {
      font-size: 0.75rem; min-height: 1.1em; margin-bottom: 10px;
      color: rgba(255,255,255,0.45);
    }
    #tiltStatus.ok  { color: #4ade80; }
    #tiltStatus.err { color: #f87171; }

    #errorMsg {
      color: #f87171;
      font-size: 0.82rem;
      margin-top: 12px;
      display: none;
      line-height: 1.5;
    }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #020610;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: rgba(255,255,255,0.8);
      z-index: 50;
      gap: 18px;
      font-size: 0.9rem;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── HUD ── */
    #hud {
      position: fixed;
      top: 48px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      z-index: 10;
      pointer-events: none;
    }

    .hud-bar {
      display: flex;
      gap: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      overflow: hidden;
    }

    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 20px;
      gap: 3px;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .hud-item:last-child { border-right: none; }

    .hud-label {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .hud-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: #93c5fd;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* ── Controls ── */
    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem;
      padding: 8px 18px;
      display: none;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }

    /* Cesium credit override */
    .cesium-widget-credits { display: none !important; }

    /* ── Mobile Controls ── */
    #mobileControls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 200px;
      display: none;
      pointer-events: none;
      z-index: 10;
    }

    /* Joystick – bottom left */
    #joystickZone {
      position: absolute;
      bottom: 20px; left: 20px;
      width: 140px; height: 140px;
      pointer-events: all;
      touch-action: none;
    }

    #joystickBase {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    #joystickThumb {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: rgba(96,165,250,0.8);
      border: 2px solid rgba(255,255,255,0.5);
      position: absolute;
      transition: none;
      will-change: transform;
    }

    /* Speed buttons – bottom right */
    #speedBtns {
      position: absolute;
      bottom: 28px; right: 24px;
      display: flex; flex-direction: column; gap: 12px;
      pointer-events: all;
    }

    .spd-btn {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1.6rem;
      font-weight: 300;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .spd-btn:active { background: rgba(96,165,250,0.4); }

    /* show on touch devices */
    @media (pointer: coarse) {
      #mobileControls { display: block; }
      #controls { display: none !important; }
    }

    /* ── Location Picker ── */
    #locationPicker {
      position: fixed; inset: 0; z-index: 200;
      display: none; flex-direction: column; background: #020610;
    }
    #locationPickerHeader {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; color: #fff; font-size: 0.88rem;
      background: rgba(0,0,0,0.8); border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    #locationPickerHeader button {
      background: none; border: none; color: rgba(255,255,255,0.6);
      font-size: 1.3rem; cursor: pointer; padding: 2px 8px; line-height: 1;
    }
    #locationMap { flex: 1; }
    #locationPickerFooter {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; gap: 12px;
      background: rgba(0,0,0,0.8); border-top: 1px solid rgba(255,255,255,0.1);
    }
    #locationLabel { color: rgba(255,255,255,0.55); font-size: 0.78rem; flex: 1; }
    #locationCancelBtn {
      padding: 10px 18px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2); background: transparent;
      color: rgba(255,255,255,0.7); font-size: 0.88rem; cursor: pointer;
    }
    #locationConfirmBtn {
      padding: 10px 22px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      color: #fff; font-size: 0.88rem; font-weight: 600; cursor: pointer;
    }
    #locationConfirmBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Location button – start screen */
    #locationSelectBtn {
      width: 100%; padding: 11px; border-radius: 8px; margin-bottom: 8px;
      border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.8); font-size: 0.9rem; cursor: pointer;
      transition: background 0.2s;
    }
    #locationSelectBtn:hover { background: rgba(255,255,255,0.13); }
    #selectedLocationDisplay {
      font-size: 0.75rem; color: #60a5fa; margin-bottom: 12px; min-height: 1.2em;
    }

    /* ── Compass Bar ── */
    #compassBar {
      position: fixed; top: 0; left: 0; right: 0; height: 44px;
      display: none; z-index: 11; align-items: stretch;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    #compassCanvas { flex: 1; height: 44px; display: block; }
    #inflightLocationBtn, #calibrateBtn {
      border: none; background: transparent; color: #fff; font-size: 0.8rem;
      padding: 0 14px; cursor: pointer; white-space: nowrap; pointer-events: all;
    }
    #inflightLocationBtn { border-left: 1px solid rgba(255,255,255,0.15); }
    #calibrateBtn { border-right: 1px solid rgba(255,255,255,0.15); }
    #inflightLocationBtn:active, #calibrateBtn:active { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

<!-- Start Screen -->
<div id="startScreen">
  <div class="start-content">
    <span class="plane-icon">✈️</span>
    <h1>3D フライトシミュレーター</h1>
    <p class="desc">Google Maps のフォトリアル 3D タイルで東京上空をリアルに飛べます。</p>
    <p class="api-note">
      Google Cloud Console で <strong>Map Tiles API</strong> を有効化した<br>API キーが必要です
    </p>
    <input type="text" id="apiKeyInput" placeholder="Google Maps API キーを入力...">
    <button id="locationSelectBtn" onclick="openLocationPicker('start')">📍 ロケーション選択</button>
    <div id="selectedLocationDisplay">東京タワー付近（デフォルト）</div>
    <div class="ctrl-selector">
      <button class="ctrl-btn active" id="modeJoyBtn" onclick="selectControlMode('joystick')">🕹 ジョイスティック</button>
      <button class="ctrl-btn" id="modeTiltBtn" onclick="selectControlMode('tilt')">📱 傾きセンサー</button>
    </div>
    <div id="tiltStatus"></div>
    <button id="startBtn" onclick="startFlight()">✈ フライト開始</button>
    <div id="errorMsg"></div>
  </div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <span>3D タイルを読み込み中...</span>
</div>

<!-- Cesium -->
<div id="cesiumContainer"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-bar">
    <div class="hud-item">
      <span class="hud-label">高度</span>
      <span class="hud-value"><span id="altVal">3000</span> m</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">速度</span>
      <span class="hud-value"><span id="spdVal">540</span> km/h</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">方位</span>
      <span class="hud-value"><span id="hdgVal">045</span>°</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">仰角</span>
      <span class="hud-value"><span id="pitchVal">+0</span>°</span>
    </div>
  </div>
</div>

<!-- Controls hint -->
<div id="controls">
  ←→ : 旋回 &nbsp;|&nbsp; ↑ : 上昇 &nbsp;|&nbsp; ↓ : 降下 &nbsp;|&nbsp; E / Q : 加速 / 減速
</div>

<!-- Location Picker -->
<div id="locationPicker">
  <div id="locationPickerHeader">
    <span>📍 地図をタップしてスタート地点を選択</span>
    <button onclick="closeLocationPicker()">✕</button>
  </div>
  <div id="locationMap"></div>
  <div id="locationPickerFooter">
    <span id="locationLabel">地図をタップして選択</span>
    <div style="display:flex;gap:8px">
      <button id="locationCancelBtn" onclick="closeLocationPicker()">キャンセル</button>
      <button id="locationConfirmBtn" onclick="confirmLocation()" disabled>決定</button>
    </div>
  </div>
</div>

<!-- Compass Bar (in-flight) -->
<div id="compassBar">
  <button id="calibrateBtn" onclick="calibrateTilt()" style="display:none">🎯 基準</button>
  <canvas id="compassCanvas"></canvas>
  <button id="inflightLocationBtn" onclick="openLocationPicker('inflight')">📍 場所</button>
</div>

<!-- Mobile Controls -->
<div id="mobileControls">
  <div id="joystickZone">
    <div id="joystickBase">
      <div id="joystickThumb"></div>
    </div>
  </div>
  <div id="speedBtns">
    <button class="spd-btn" id="btnSpeedUp">＋</button>
    <button class="spd-btn" id="btnSpeedDown">－</button>
  </div>
</div>

<script>
// ── Location Picker ──
let startLon = 139.7454;
let startLat  = 35.6586;
let controlMode = 'joystick'; // 'joystick' | 'tilt'
let tiltCalib = { beta: 0, gamma: 0 };
let currentTilt = { beta: 0, gamma: 0 };

async function selectControlMode(mode) {
  const statusEl = document.getElementById('tiltStatus');
  if (mode === 'tilt') {
    // iOS requires explicit permission request from user gesture
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const res = await DeviceOrientationEvent.requestPermission();
        if (res !== 'granted') {
          statusEl.textContent = '傾きセンサーの許可が必要です';
          statusEl.className = 'err';
          return;
        }
      } catch(e) {
        statusEl.textContent = '許可の取得に失敗しました';
        statusEl.className = 'err';
        return;
      }
    }
    controlMode = 'tilt';
    statusEl.textContent = '傾きセンサー有効 ✓';
    statusEl.className = 'ok';
  } else {
    controlMode = 'joystick';
    statusEl.textContent = '';
    statusEl.className = '';
  }
  document.getElementById('modeJoyBtn').classList.toggle('active', mode === 'joystick');
  document.getElementById('modeTiltBtn').classList.toggle('active', mode === 'tilt');
}

function calibrateTilt() {
  tiltCalib.beta  = currentTilt.beta;
  tiltCalib.gamma = currentTilt.gamma;
}

window.addEventListener('deviceorientation', e => {
  currentTilt.beta  = e.beta  || 0;
  currentTilt.gamma = e.gamma || 0;
});

let pickedLon = null;
let pickedLat = null;
let pickerMode = 'start';
let leafletMap = null;
let leafletMarker = null;
let teleportFn = null;
let flightPaused = false;

function openLocationPicker(mode) {
  pickerMode = mode || 'start';
  pickedLon = null;
  pickedLat = null;
  document.getElementById('locationPicker').style.display = 'flex';
  document.getElementById('locationConfirmBtn').disabled = true;
  document.getElementById('locationLabel').textContent = '地図をタップして選択';
  if (pickerMode === 'inflight') flightPaused = true;

  setTimeout(() => {
    if (!leafletMap) {
      leafletMap = L.map('locationMap').setView([35.6586, 139.7454], 9);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
      }).addTo(leafletMap);
      leafletMap.on('click', e => {
        pickedLat = e.latlng.lat;
        pickedLon = e.latlng.lng;
        if (leafletMarker) {
          leafletMarker.setLatLng(e.latlng);
        } else {
          leafletMarker = L.marker(e.latlng).addTo(leafletMap);
        }
        document.getElementById('locationLabel').textContent =
          `${pickedLat.toFixed(4)}°N, ${pickedLon.toFixed(4)}°E`;
        document.getElementById('locationConfirmBtn').disabled = false;
      });
    } else {
      leafletMap.invalidateSize();
    }
  }, 80);
}

function closeLocationPicker() {
  document.getElementById('locationPicker').style.display = 'none';
  if (pickerMode === 'inflight') flightPaused = false;
}

function confirmLocation() {
  if (pickedLon === null) return;
  if (pickerMode === 'start') {
    startLon = pickedLon;
    startLat = pickedLat;
    document.getElementById('selectedLocationDisplay').textContent =
      `${pickedLat.toFixed(4)}°N, ${pickedLon.toFixed(4)}°E`;
  } else if (teleportFn) {
    teleportFn(pickedLon, pickedLat);
  }
  closeLocationPicker();
}

async function startFlight() {
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  const errEl  = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  if (!apiKey) {
    errEl.textContent = 'APIキーを入力してください。';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = '読み込み中...';

  document.getElementById('loading').style.display = 'flex';
  document.getElementById('startScreen').style.display = 'none';

  // ── Cesium viewer ──
  Cesium.GoogleMaps.defaultApiKey = apiKey;

  const viewer = new Cesium.Viewer('cesiumContainer', {
    globe:                  false,
    skyBox:                 false,
    skyAtmosphere:          false,
    animation:              false,
    baseLayerPicker:        false,
    geocoder:               false,
    homeButton:             false,
    sceneModePicker:        false,
    navigationHelpButton:   false,
    timeline:               false,
    fullscreenButton:       false,
    infoBox:                false,
    selectionIndicator:     false,
  });

  // Disable default camera controls — we drive it ourselves
  const ctrl = viewer.scene.screenSpaceCameraController;
  ctrl.enableRotate = ctrl.enableZoom = ctrl.enablePan =
  ctrl.enableTilt   = ctrl.enableLook = false;

  // Background sky colour
  viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#a8c8f0');

  // ── Google Photorealistic 3D Tiles ──
  let tileset;
  try {
    tileset = await Cesium.createGooglePhotorealistic3DTileset();
    viewer.scene.primitives.add(tileset);
  } catch (e) {
    document.getElementById('loading').style.display  = 'none';
    document.getElementById('startScreen').style.display = 'flex';
    btn.disabled    = false;
    btn.textContent = '✈ フライト開始';
    errEl.textContent = 'APIキーが無効か、Map Tiles API が有効になっていません。';
    errEl.style.display = 'block';
    return;
  }

  // ── Show UI ──
  document.getElementById('cesiumContainer').style.display = 'block';
  document.getElementById('loading').style.display  = 'none';
  document.getElementById('hud').style.display      = 'flex';
  document.getElementById('controls').style.display = 'block';
  document.getElementById('compassBar').style.display = 'flex';

  // Tilt mode UI adjustments
  if (controlMode === 'tilt') {
    document.getElementById('joystickZone').style.display = 'none';
    document.getElementById('calibrateBtn').style.display = 'block';
    // Calibrate on flight start
    calibrateTilt();
  }

  // ── Flight state (Tokyo, 3 km up, heading NE) ──
  const state = {
    lon:     startLon,
    lat:     startLat,
    alt:     3000,      // metres
    heading: 45,        // degrees (0 = north)
    pitch:   0,         // degrees (positive = nose up)
    speed:   150,       // m/s
    bank:    0,         // degrees (positive = right wing down)
    turnRate:  0,       // deg/s (with inertia)
    pitchRate: 0,       // deg/s (with inertia)
  };

  // Teleport function for in-flight location change
  teleportFn = (lon, lat) => {
    state.lon = lon; state.lat = lat;
    state.alt = 3000; state.heading = 0; state.pitch = 0; state.bank = 0;
    state.turnRate = 0; state.pitchRate = 0;
  };

  // ── Compass drawing ──
  const compassCanvas = document.getElementById('compassCanvas');
  function drawCompass(heading) {
    const dpr = window.devicePixelRatio || 1;
    const w = compassCanvas.offsetWidth;
    const h = compassCanvas.offsetHeight;
    if (compassCanvas.width !== w * dpr) {
      compassCanvas.width  = w * dpr;
      compassCanvas.height = h * dpr;
    }
    const ctx = compassCanvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);

    const scale = w / 90; // 90° visible range
    const cx = w / 2;
    const labels = {0:'N',45:'NE',90:'E',135:'SE',180:'S',225:'SW',270:'W',315:'NW'};

    for (let i = -50; i <= 50; i++) {
      const deg = ((Math.round(heading) + i) % 360 + 360) % 360;
      const x = cx + i * scale;
      if (x < -10 || x > w + 10) continue;

      if (deg % 45 === 0) {
        ctx.strokeStyle = deg % 90 === 0 ? '#60a5fa' : 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(x, h * 0.12); ctx.lineTo(x, h * 0.62); ctx.stroke();
        ctx.fillStyle = deg % 90 === 0 ? '#60a5fa' : 'rgba(255,255,255,0.65)';
        ctx.font = `bold ${deg % 90 === 0 ? 11 : 9}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(labels[deg], x, h * 0.92);
      } else if (deg % 10 === 0) {
        ctx.strokeStyle = 'rgba(255,255,255,0.45)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x, h * 0.35); ctx.lineTo(x, h * 0.62); ctx.stroke();
      } else if (deg % 5 === 0) {
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x, h * 0.5); ctx.lineTo(x, h * 0.62); ctx.stroke();
      }
    }
    // Center indicator triangle
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(cx - 5, 1); ctx.lineTo(cx + 5, 1); ctx.lineTo(cx, 9);
    ctx.closePath(); ctx.fill();
  }

  // ── Plane entity (3 boxes: fuselage / wings / tail) ──
  function makePosCb() {
    return new Cesium.CallbackProperty(
      () => Cesium.Cartesian3.fromDegrees(state.lon, state.lat, state.alt), false);
  }

  function makeOrientCb() {
    return new Cesium.CallbackProperty(() => {
      const pos = Cesium.Cartesian3.fromDegrees(state.lon, state.lat, state.alt);
      return Cesium.Transforms.headingPitchRollQuaternion(
        pos,
        new Cesium.HeadingPitchRoll(
          Cesium.Math.toRadians(state.heading),
          Cesium.Math.toRadians(-state.bank),
          Cesium.Math.toRadians(state.pitch)
        )
      );
    }, false);
  }

  // Fuselage
  viewer.entities.add({
    position:    makePosCb(),
    orientation: makeOrientCb(),
    box: {
      dimensions: new Cesium.Cartesian3(6, 48, 5),
      material:   Cesium.Color.WHITE,
    }
  });

  // Wings
  viewer.entities.add({
    position:    makePosCb(),
    orientation: makeOrientCb(),
    box: {
      dimensions: new Cesium.Cartesian3(58, 9, 1.5),
      material:   Cesium.Color.fromCssColorString('#e0e8ff'),
    }
  });

  // Vertical stabiliser (tail fin)
  viewer.entities.add({
    position:    makePosCb(),
    orientation: makeOrientCb(),
    box: {
      dimensions: new Cesium.Cartesian3(1.5, 10, 13),
      material:   Cesium.Color.WHITE,
    }
  });

  // ── Keyboard ──
  const keys = {};
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  // ── Touch / Joystick ──
  const joy = { dx: 0, dy: 0, active: false };
  const touch = { speedUp: false, speedDown: false };
  const JOYSTICK_RADIUS = 44; // max thumb travel px

  const joyZone  = document.getElementById('joystickZone');
  const joyThumb = document.getElementById('joystickThumb');

  function joyMove(cx, cy) {
    const rect = joyZone.getBoundingClientRect();
    const ox = cx - (rect.left + rect.width  / 2);
    const oy = cy - (rect.top  + rect.height / 2);
    const dist = Math.sqrt(ox*ox + oy*oy);
    const scale = dist > JOYSTICK_RADIUS ? JOYSTICK_RADIUS / dist : 1;
    joy.dx = (ox * scale) / JOYSTICK_RADIUS;
    joy.dy = (oy * scale) / JOYSTICK_RADIUS;
    joyThumb.style.transform =
      `translate(${ox * scale}px, ${oy * scale}px)`;
  }

  joyZone.addEventListener('touchstart', e => {
    e.preventDefault();
    joy.active = true;
    joyMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });

  joyZone.addEventListener('touchmove', e => {
    e.preventDefault();
    joyMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });

  joyZone.addEventListener('touchend', e => {
    e.preventDefault();
    joy.active = false; joy.dx = 0; joy.dy = 0;
    joyThumb.style.transform = 'translate(0,0)';
  }, { passive: false });

  const btnUp   = document.getElementById('btnSpeedUp');
  const btnDown = document.getElementById('btnSpeedDown');

  btnUp.addEventListener('touchstart',   e => { e.preventDefault(); touch.speedUp   = true;  }, { passive: false });
  btnUp.addEventListener('touchend',     e => { e.preventDefault(); touch.speedUp   = false; }, { passive: false });
  btnDown.addEventListener('touchstart', e => { e.preventDefault(); touch.speedDown = true;  }, { passive: false });
  btnDown.addEventListener('touchend',   e => { e.preventDefault(); touch.speedDown = false; }, { passive: false });

  // ── Animation loop ──
  let lastTime = performance.now();

  viewer.scene.preUpdate.addEventListener(() => {
    const now = performance.now();
    const dt  = Math.min((now - lastTime) / 1000, 0.1);
    lastTime  = now;
    if (flightPaused) return;

    const TURN  = 50;   // deg/s
    const PTCH  = 35;   // deg/s
    const ACCEL = 40;   // m/s²

    if (keys['KeyE'] || keys['Equal'] || keys['NumpadAdd'] || touch.speedUp)
      state.speed = Math.min(state.speed + ACCEL * dt, 350);
    if (keys['KeyQ'] || keys['Minus'] || keys['NumpadSubtract'] || touch.speedDown)
      state.speed = Math.max(state.speed - ACCEL * dt, 30);

    // Desired turn/pitch rates from all inputs
    let desTurn  = 0;
    let desPitch = 0;

    if (keys['ArrowLeft']  || keys['KeyA']) desTurn  -= TURN;
    if (keys['ArrowRight'] || keys['KeyD']) desTurn  += TURN;
    if (keys['ArrowUp']    || keys['KeyW']) desPitch += PTCH;
    if (keys['ArrowDown']  || keys['KeyS']) desPitch -= PTCH;

    if (controlMode === 'joystick' && joy.active) {
      desTurn  += TURN * joy.dx;
      desPitch += PTCH * (-joy.dy);
    }

    if (controlMode === 'tilt') {
      const tiltLR = currentTilt.gamma - tiltCalib.gamma;
      const tiltFB = currentTilt.beta  - tiltCalib.beta;
      desTurn  += TURN * Math.max(-1, Math.min(1, tiltLR / 25));
      const targetPitch = Math.max(-50, Math.min(50, tiltFB * 1.2));
      desPitch += (targetPitch - state.pitch) * 6; // tilt pitch targets position, not rate
    }

    // Apply inertia: rates ease toward desired values
    const INERTIA = 0.35;
    state.turnRate  += (desTurn  - state.turnRate)  * Math.min(1, INERTIA * dt);
    state.pitchRate += (desPitch - state.pitchRate) * Math.min(1, INERTIA * dt);

    state.heading += state.turnRate  * dt;
    state.pitch    = Math.max(-50, Math.min(50, state.pitch + state.pitchRate * dt));

    // Auto-level pitch when no input
    const pitchInputActive = keys['ArrowUp'] || keys['KeyW'] || keys['ArrowDown'] || keys['KeyS']
      || (controlMode === 'joystick' && joy.active) || controlMode === 'tilt';
    if (!pitchInputActive) {
      state.pitchRate *= Math.pow(0.05, dt);
      state.pitch     *= Math.pow(0.05, dt);
      if (Math.abs(state.pitch) < 0.05) state.pitch = 0;
    }

    // Bank angle: follows turn input smoothly
    const turnInput = (keys['ArrowRight'] || keys['KeyD'] ? 1 : 0)
                    - (keys['ArrowLeft']  || keys['KeyA'] ? 1 : 0)
                    + (controlMode === 'joystick' && joy.active ? joy.dx : 0)
                    + (controlMode === 'tilt' ? Math.max(-1, Math.min(1, (currentTilt.gamma - tiltCalib.gamma) / 25)) : 0);
    const targetBank = Math.max(-40, Math.min(40, turnInput * 40));
    state.bank += (targetBank - state.bank) * Math.min(1, 4 * dt);

    state.heading = ((state.heading % 360) + 360) % 360;

    // Position update
    const hRad = Cesium.Math.toRadians(state.heading);
    const pRad = Cesium.Math.toRadians(state.pitch);
    const spd  = state.speed;

    const dHoriz = spd * dt * Math.cos(pRad);
    const dVert  = spd * dt * Math.sin(pRad);
    const dx = dHoriz * Math.sin(hRad);
    const dy = dHoriz * Math.cos(hRad);

    const mpDegLat = 111320;
    const mpDegLon = 111320 * Math.cos(Cesium.Math.toRadians(state.lat));

    state.lon += dx / mpDegLon;
    state.lat += dy / mpDegLat;
    state.alt  = Math.max(80, Math.min(45000, state.alt + dVert));

    // ── Third-person camera ──
    const pos = Cesium.Cartesian3.fromDegrees(state.lon, state.lat, state.alt);

    // Camera sits in front of the plane (opposite side workaround for forward movement)
    const camHeading = Cesium.Math.toRadians(state.heading);
    const camPitch   = Cesium.Math.toRadians(-14 - Math.abs(state.pitch) * 0.15);
    const camRange   = Math.min(180 + state.alt * 0.015, 380);

    viewer.camera.lookAt(pos, new Cesium.HeadingPitchRange(camHeading, camPitch, camRange));

    // ── HUD ──
    document.getElementById('altVal').textContent  = Math.round(state.alt).toLocaleString();
    document.getElementById('spdVal').textContent  = Math.round(state.speed * 3.6);
    document.getElementById('hdgVal').textContent  = String(Math.round(state.heading)).padStart(3, '0');
    const p = Math.round(state.pitch);
    document.getElementById('pitchVal').textContent = (p >= 0 ? '+' : '') + p;
    drawCompass(state.heading);
  });
}
</script>
</body>
</html>
