<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シンプルなページ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 48px;
      max-width: 600px;
      width: 90%;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      color: #1a1a2e;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      color: #666;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      background: #4f46e5;
      color: #fff;
      padding: 12px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>こんにちは！</h1>
    <p>これはシンプルなウェブページです。<br>ここにコンテンツを追加してください。</p>
    <a href="#" class="btn">はじめる</a>
  </div>
</body>
</html>
