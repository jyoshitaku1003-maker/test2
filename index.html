<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D フライトシミュレーター</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #020610;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    #cesiumContainer {
      width: 100vw;
      height: 100vh;
      display: none;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 60%, #0d1b3e 0%, #020610 100%);
      z-index: 100;
    }

    .start-content {
      text-align: center;
      color: #fff;
      max-width: 440px;
      padding: 0 24px;
    }

    .plane-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-8deg); }
      50%       { transform: translateY(-14px) rotate(-3deg); }
    }

    .start-content h1 {
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .start-content .desc {
      color: rgba(255,255,255,0.55);
      font-size: 0.88rem;
      line-height: 1.65;
      margin-bottom: 8px;
    }

    .api-note {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .api-note a { color: #60a5fa; }

    #apiKeyInput {
      width: 100%;
      padding: 13px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 0.93rem;
      margin-bottom: 10px;
      outline: none;
      transition: border 0.2s;
    }

    #apiKeyInput::placeholder { color: rgba(255,255,255,0.28); }
    #apiKeyInput:focus { border-color: #60a5fa; }

    #startBtn {
      width: 100%;
      padding: 13px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      color: #fff;
      font-size: 0.97rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }

    #startBtn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    #startBtn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    #errorMsg {
      color: #f87171;
      font-size: 0.82rem;
      margin-top: 12px;
      display: none;
      line-height: 1.5;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #020610;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: rgba(255,255,255,0.8);
      z-index: 50;
      gap: 18px;
      font-size: 0.9rem;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #hud {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      z-index: 10;
      pointer-events: none;
    }

    .hud-bar {
      display: flex;
      gap: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      overflow: hidden;
    }

    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 20px;
      gap: 3px;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .hud-item:last-child { border-right: none; }

    .hud-label {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .hud-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: #93c5fd;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem;
      padding: 8px 18px;
      display: none;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }

    .cesium-widget-credits { display: none !important; }
  </style>
</head>
<body>

<div id="startScreen">
  <div class="start-content">
    <span class="plane-icon">✈️</span>
    <h1>3D フライトシミュレーター</h1>
    <p class="desc">Google Maps のフォトリアル 3D タイルで東京上空をリアルに飛べます。</p>
    <p class="api-note">
      Google Cloud Console で <strong>Map Tiles API</strong> を有効化した<br>API キーが必要です
    </p>
    <input type="text" id="apiKeyInput" placeholder="Google Maps API キーを入力...">
    <button id="startBtn" onclick="startFlight()">✈ フライト開始</button>
    <div id="errorMsg"></div>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <span>3D タイルを読み込み中...</span>
</div>

<div id="cesiumContainer"></div>

<div id="hud">
  <div class="hud-bar">
    <div class="hud-item">
      <span class="hud-label">高度</span>
      <span class="hud-value"><span id="altVal">3000</span> m</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">速度</span>
      <span class="hud-value"><span id="spdVal">540</span> km/h</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">方位</span>
      <span class="hud-value"><span id="hdgVal">045</span>°</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">仰角</span>
      <span class="hud-value"><span id="pitchVal">+0</span>°</span>
    </div>
  </div>
</div>

<div id="controls">
  ←→ : 旋回 &nbsp;|&nbsp; ↑ : 上昇 &nbsp;|&nbsp; ↓ : 降下 &nbsp;|&nbsp; E / Q : 加速 / 減速
</div>

<script>
async function startFlight() {
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  const errEl  = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  if (!apiKey) {
    errEl.textContent = 'APIキーを入力してください。';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = '読み込み中...';

  document.getElementById('loading').style.display = 'flex';
  document.getElementById('startScreen').style.display = 'none';

  Cesium.GoogleMaps.defaultApiKey = apiKey;

  const viewer = new Cesium.Viewer('cesiumContainer', {
    globe: false, skyBox: false, skyAtmosphere: false,
    animation: false, baseLayerPicker: false, geocoder: false,
    homeButton: false, sceneModePicker: false, navigationHelpButton: false,
    timeline: false, fullscreenButton: false, infoBox: false, selectionIndicator: false,
  });

  const ctrl = viewer.scene.screenSpaceCameraController;
  ctrl.enableRotate = ctrl.enableZoom = ctrl.enablePan =
  ctrl.enableTilt   = ctrl.enableLook = false;

  viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#a8c8f0');

  let tileset;
  try {
    tileset = await Cesium.createGooglePhotorealistic3DTileset();
    viewer.scene.primitives.add(tileset);
  } catch (e) {
    document.getElementById('loading').style.display  = 'none';
    document.getElementById('startScreen').style.display = 'flex';
    btn.disabled    = false;
    btn.textContent = '✈ フライト開始';
    errEl.textContent = 'APIキーが無効か、Map Tiles API が有効になっていません。';
    errEl.style.display = 'block';
    return;
  }

  document.getElementById('cesiumContainer').style.display = 'block';
  document.getElementById('loading').style.display  = 'none';
  document.getElementById('hud').style.display      = 'flex';
  document.getElementById('controls').style.display = 'block';

  const state = {
    lon: 139.7454, lat: 35.6586, alt: 3000,
    heading: 45, pitch: 0, speed: 150,
  };

  function makePosCb() {
    return new Cesium.CallbackProperty(
      () => Cesium.Cartesian3.fromDegrees(state.lon, state.lat, state.alt), false);
  }

  function makeOrientCb() {
    return new Cesium.CallbackProperty(() => {
      const pos = Cesium.Cartesian3.fromDegrees(state.lon, state.lat, state.alt);
      return Cesium.Transforms.headingPitchRollQuaternion(
        pos,
        new Cesium.HeadingPitchRoll(
          Cesium.Math.toRadians(state.heading),
          Cesium.Math.toRadians(state.pitch),
          0
        )
      );
    }, false);
  }

  viewer.entities.add({ position: makePosCb(), orientation: makeOrientCb(),
    box: { dimensions: new Cesium.Cartesian3(6, 48, 5), material: Cesium.Color.WHITE } });
  viewer.entities.add({ position: makePosCb(), orientation: makeOrientCb(),
    box: { dimensions: new Cesium.Cartesian3(58, 9, 1.5), material: Cesium.Color.fromCssColorString('#e0e8ff') } });
  viewer.entities.add({ position: makePosCb(), orientation: makeOrientCb(),
    box: { dimensions: new Cesium.Cartesian3(1.5, 10, 13), material: Cesium.Color.WHITE } });

  const keys = {};
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  let lastTime = performance.now();

  viewer.scene.preUpdate.addEventListener(() => {
    const now = performance.now();
    const dt  = Math.min((now - lastTime) / 1000, 0.1);
    lastTime  = now;

    const TURN = 50, PTCH = 35, ACCEL = 40;

    if (keys['ArrowLeft']  || keys['KeyA']) state.heading -= TURN * dt;
    if (keys['ArrowRight'] || keys['KeyD']) state.heading += TURN * dt;
    if (keys['ArrowUp']    || keys['KeyW']) state.pitch = Math.min(state.pitch + PTCH * dt, 50);
    if (keys['ArrowDown']  || keys['KeyS']) state.pitch = Math.max(state.pitch - PTCH * dt, -50);
    if (keys['KeyE'] || keys['Equal'] || keys['NumpadAdd'])
      state.speed = Math.min(state.speed + ACCEL * dt, 350);
    if (keys['KeyQ'] || keys['Minus'] || keys['NumpadSubtract'])
      state.speed = Math.max(state.speed - ACCEL * dt, 30);

    if (!keys['ArrowUp'] && !keys['KeyW'] && !keys['ArrowDown'] && !keys['KeyS']) {
      state.pitch *= Math.pow(0.05, dt);
      if (Math.abs(state.pitch) < 0.05) state.pitch = 0;
    }

    state.heading = ((state.heading % 360) + 360) % 360;

    const hRad = Cesium.Math.toRadians(state.heading);
    const pRad = Cesium.Math.toRadians(state.pitch);
    const dHoriz = state.speed * dt * Math.cos(pRad);
    const dVert  = state.speed * dt * Math.sin(pRad);

    state.lon += dHoriz * Math.sin(hRad) / (111320 * Math.cos(Cesium.Math.toRadians(state.lat)));
    state.lat += dHoriz * Math.cos(hRad) / 111320;
    state.alt  = Math.max(80, Math.min(45000, state.alt + dVert));

    const pos = Cesium.Cartesian3.fromDegrees(state.lon, state.lat, state.alt);
    const camHeading = Cesium.Math.toRadians(state.heading + 180);
    const camPitch   = Cesium.Math.toRadians(-14 - Math.abs(state.pitch) * 0.15);
    const camRange   = Math.min(180 + state.alt * 0.015, 380);

    viewer.camera.lookAt(pos, new Cesium.HeadingPitchRange(camHeading, camPitch, camRange));

    document.getElementById('altVal').textContent  = Math.round(state.alt).toLocaleString();
    document.getElementById('spdVal').textContent  = Math.round(state.speed * 3.6);
    document.getElementById('hdgVal').textContent  = String(Math.round(state.heading)).padStart(3, '0');
    const p = Math.round(state.pitch);
    document.getElementById('pitchVal').textContent = (p >= 0 ? '+' : '') + p;
  });
}
</script>
</body>
</html>
